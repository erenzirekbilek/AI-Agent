version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend

volumes:
  qdrant_data:
